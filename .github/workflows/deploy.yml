name: Deploy to cyberFolks

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy via FTP
        run: |
          sudo apt-get install -y lftp
          lftp -e "set ftp:ssl-allow no; set net:timeout 30; set net:max-retries 3; mirror -R --delete --exclude .git --exclude node_modules frontend/dist/ /; bye" \
            -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" \
            ${{ secrets.FTP_HOST }}
